name: Sync Mori Docs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-mori-docs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync upstream docs
        run: bun run docs:sync

      - name: Verify generated docs
        run: |
          bun run typecheck
          bun run build

      - name: Detect content changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- content/docs)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit synced docs
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Yoru Akio"
          git config user.email "yoruakio@proton.me"
          git add -- content/docs
          git commit -m "chore: sync Mori docs"

      - name: Rebase before push
        if: steps.changes.outputs.changed == 'true'
        run: git pull --rebase origin "${{ github.ref_name }}"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: git push
